<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../../src/styles/common.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <div class="sidebar left">
      <h2>Statistics</h2>
      <p>Total time: <strong id="totalTime">0h</strong></p>
      <p>Sessions: <strong id="sessions">0</strong></p>
      <p>Longest: <strong id="longest">0m</strong></p>
    </div>

    <div class="main-content">
      <div class="timer-display" id="timerDisplay">5:00</div>
      <div class="controls">
        <button id="startBtn" class="btn">Start</button>
        <button id="pauseBtn" class="btn" disabled>Pause</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
      <input type="number" id="customTime" placeholder="Minutes" min="1" max="180">
      <button id="setBtn" class="btn secondary">Set Time</button>
    </div>

    <div class="sidebar right">
      <h2>Settings</h2>
      <label>
        <input type="checkbox" id="soundToggle" checked>
        Sound notifications
      </label>
      <label>
        <input type="checkbox" id="desktopToggle" checked>
        Desktop notifications
      </label>
      <hr>
      <h3>Theme</h3>
      <select id="themeSelect">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="auto">Auto</option>
      </select>
    </div>
  </div>

  <script src="../../src/utils/timer.js"></script>
  <script src="../../src/utils/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
